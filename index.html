<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosute Engineering</title>
    <script src="https://telegram.org"></script>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #0b0f1a; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .card { background: #161b2b; border: 1px solid #2d334a; border-radius: 12px; }
        .accent { color: #00aaff; }
        .btn-primary { background: #0066ff; transition: 0.3s; }
        .btn-primary:hover { background: #0052cc; }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <nav class="p-4 border-b border-gray-800 bg-[#0b0f1a] sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-bold text-xl accent">MOSUTE <span class="text-white text-sm">ENG.</span></h1>
        <button onclick="window.Telegram.WebApp.close()" class="text-gray-400"><i class="fas fa-times"></i></button>
    </nav>

    <!-- Services Section -->
    <section class="p-5">
        <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Our Services</h2>
        <div class="grid grid-cols-1 gap-4">
            <div class="card p-4 flex items-start gap-4">
                <div class="bg-blue-900/30 p-3 rounded-lg accent"><i class="fas fa-bolt fa-lg"></i></div>
                <div>
                    <h3 class="font-bold">Electrical Systems</h3>
                    <p class="text-sm text-gray-400">Installation, maintenance, and power management.</p>
                </div>
            </div>
            <div class="card p-4 flex items-start gap-4">
                <div class="bg-blue-900/30 p-3 rounded-lg accent"><i class="fas fa-robot fa-lg"></i></div>
                <div>
                    <h3 class="font-bold">Industrial Automation</h3>
                    <p class="text-sm text-gray-400">Smart control systems and PLC programming.</p>
                </div>
            </div>
            <div class="card p-4 flex items-start gap-4">
                <div class="bg-blue-900/30 p-3 rounded-lg accent"><i class="fas fa-network-wired fa-lg"></i></div>
                <div>
                    <h3 class="font-bold">Networking</h3>
                    <p class="text-sm text-gray-400">Robust IT infrastructure and smart systems.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Service Request Form -->
    <section class="p-5">
        <div class="card p-6">
            <h2 class="text-xl font-bold mb-4">Service Request</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Service Type</label>
                    <select id="serviceType" class="w-full bg-[#0b0f1a] border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500">
                        <option>Electrical</option>
                        <option>Automation</option>
                        <option>Networking</option>
                        <option>Consultation</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Description</label>
                    <textarea id="desc" placeholder="Tell us about your project..." class="w-full bg-[#0b0f1a] border border-gray-700 rounded-lg p-3 h-24 outline-none focus:border-blue-500"></textarea>
                </div>
                <button onclick="sendRequest()" class="w-full btn-primary py-4 rounded-xl font-bold">Submit Request</button>
            </div>
        </div>
    </section>

    <!-- Contact Info -->
    <section class="p-5 text-center">
        <h2 class="text-gray-500 text-sm mb-4">Need immediate help?</h2>
        <div class="flex justify-center gap-6">
            <a href="tel:+251939879030" class="accent"><i class="fas fa-phone-alt fa-2x"></i></a>
            <a href="https://wa.me" class="text-green-500"><i class="fab fa-whatsapp fa-2x"></i></a>
        </div>
        <p class="mt-4 text-xs text-gray-600">Established April 2026 | Addis Ababa</p>
    </section>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function sendRequest() {
            const type = document.getElementById('serviceType').value;
            const desc = document.getElementById('desc').value;

            if(!desc) {
                tg.showAlert("Please describe your request.");
                return;
            }

            tg.HapticFeedback.impactOccurred('medium');
            
            // This sends a message back to the bot
            tg.sendData(JSON.stringify({
                service: type,
                details: desc
            }));
            
            tg.showAlert("Request Submitted! Our engineers will review it.");
        }
    </script>
</body>
</html>
